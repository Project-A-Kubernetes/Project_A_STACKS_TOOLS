#configuring argocd 
apiVersion:  argoproj.io/v1alpha1  
kind: Application 
metadata:
  name: sc-argocd 
  namespace: argocd 

spec:
  project: default 
  source:
    repoURL: "https://github.com/Project-A-Kubernetes/Project_A_Prometheus-stacks.git"
    targetRevision: main 
    path: storage/ 
  destination: 
    server: "https://kubernetes.default.svc"
    namespace: argocd 
  syncPolicy: 
    automated:
      prune: true 
      selfHeal: true 
  
