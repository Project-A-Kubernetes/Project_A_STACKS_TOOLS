apiVersion: argoproj.io/v1alpha1 
kind: Application 
metadata:
  name: kube-prometheus-stack 
  namespace: argocd 
spec:
  project: default 
  source:
    repoURL: "https://prometheus-community.github.io/helm-charts" 
    chart: kube-prometheus-stack
    targetRevision: 82.2.1
    helm:
      valueFiles:
        - value.yml 
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitor 
  syncPolicy:
    automated:
      prune: true 
      selfHeal: true 
